<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FameFlow</title>
    <style>
      :root {
        --bg: #fafafc;
        --surface: #ffffff;
        --brand: #dbd4fa;
        --brand-strong: #8f7cf6;
        --mint: #c6fce4;
        --ink: #1e1e24;
        --muted: #6f6f7a;
        --line: #e8e6f2;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 22% 12%, rgba(198, 252, 228, 0.58), transparent 26%),
          radial-gradient(circle at 78% 0%, rgba(219, 212, 250, 0.68), transparent 28%),
          var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(100%, 980px);
        min-height: 100dvh;
        display: grid;
        align-content: center;
        gap: 32px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mark {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }

      .brand strong {
        font-size: 26px;
        line-height: 32px;
        font-weight: 800;
      }

      .intro {
        max-width: 700px;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 7vw, 72px);
        line-height: 0.96;
        font-weight: 850;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        max-width: 580px;
        color: var(--muted);
        font-size: 20px;
        line-height: 30px;
        font-weight: 600;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .choice {
        min-height: 220px;
        display: grid;
        align-content: space-between;
        gap: 24px;
        padding: 24px;
        border: 1px solid color-mix(in srgb, var(--brand) 78%, transparent);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 16px 40px rgba(31, 28, 45, 0.08);
      }

      .choice:hover {
        border-color: var(--brand-strong);
      }

      .choice-icon {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--brand);
        color: #2d235f;
      }

      .choice.website .choice-icon {
        background: var(--mint);
        color: #0b5b46;
      }

      .choice svg {
        width: 28px;
        height: 28px;
      }

      .choice h2 {
        margin: 0;
        font-size: 30px;
        line-height: 36px;
        font-weight: 800;
      }

      .choice .description {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 16px;
        line-height: 24px;
        font-weight: 600;
      }

      .choice-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #2d235f;
        font-size: 16px;
        line-height: 24px;
        font-weight: 800;
      }

      @media (max-width: 720px) {
        .shell {
          align-content: start;
          padding-top: 28px;
          gap: 24px;
        }

        .choices {
          grid-template-columns: 1fr;
        }

        .choice {
          min-height: 168px;
          gap: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand" aria-label="FameFlow">
        <img class="mark" src="3Dlogo.png" alt="" />
        <strong>FameFlow</strong>
      </div>

      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">Choose how to open FameFlow</h1>
        <p>Open the desktop website experience or jump straight into the mobile application prototype.</p>
      </section>

      <section class="choices" aria-label="Open FameFlow">
        <a class="choice website" href="desktop/">
          <span class="choice-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="13" rx="2" />
              <path d="M8 21h8M12 18v3" />
            </svg>
          </span>
          <div class="choice-copy">
            <h2>Website</h2>
            <span class="description">Open the desktop web experience.</span>
          </div>
          <span class="choice-cta">Open website
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>
        </a>

        <a class="choice app" href="app.html">
          <span class="choice-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="7" y="2.5" width="10" height="19" rx="3" />
              <path d="M10 18h4" />
            </svg>
          </span>
          <div class="choice-copy">
            <h2>Application</h2>
            <span class="description">Open the mobile app prototype.</span>
          </div>
          <span class="choice-cta">Open app
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
